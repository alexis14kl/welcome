<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Yilson Alexis Malambo Madrigal</title>
  <script>
    // Redirige rutas de GitHub Pages al index con el path como query param
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      '/?p=' + l.pathname.slice(1).replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
